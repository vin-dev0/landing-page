{{ define "main" }}
<article class="blog-single-section">
    <div class="container">
        <header class="blog-header">
            <div class="blog-meta-top">
                <span class="blog-date">{{ .Date.Format "Jan 2, 2006" }}</span>
                <span class="blog-reading-time">{{ .ReadingTime }} min read</span>
            </div>
            <h1 class="blog-title">{{ .Title }}</h1>
            <div class="blog-author">
                <div class="author-avatar"></div>
                <div class="author-info">
                    <span class="author-handle">@vin-dev0</span>
                </div>
            </div>
            <hr class="blog-header-divider">
        </header>

        <div class="blog-content">
            {{ .Content }}
        </div>

        <footer class="blog-footer">
            <a href="{{ " /blog" | relURL }}" class="btn btn-secondary">Back to all posts</a>
        </footer>
    </div>
</article>
{{ end }}
